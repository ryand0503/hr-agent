services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: hr_agent
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_agent"]
      interval: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://hr_user:hr_pass@db:5432/hr_agent
    volumes:
      - ./cv_files:/app/cv_files
      - "C:\\Users\\RyanDawil\\OneDrive - Petra Energy Berhad\\Desktop\\Python Projects\\hr_agent\\cv_files:/app/input_cvs:ro"

volumes:
  pg_data:
